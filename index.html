<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6 a 7 - Draft de Times Históricos</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121212; color: #fafafa; padding: 20px; overflow-x: hidden; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #2a2a2a; padding-bottom: 15px; margin-bottom: 20px; }
        .logo h1 { font-size: 26px; color: #d4af37; letter-spacing: 2px; }
        .logo p { font-size: 11px; color: #888; text-transform: uppercase; }
        .controls { display: flex; gap: 15px; align-items: center; }
        select, button { background-color: #1e1e1e; color: #fafafa; border: 1px solid #d4af37; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 14px; transition: 0.2s; font-weight: bold; }
        button:hover { background-color: #d4af37; color: #121212; }
        button:disabled { opacity: 0.3; cursor: not-allowed; border-color: #555; background: #1e1e1e; color: #555; }
        
        .main-container { display: grid; grid-template-columns: 320px 1fr 320px; gap: 20px; height: calc(100vh - 100px); min-height: 650px; }
        
        /* DRAFT UI */
        .left-panel { background-color: #1e1e1e; border-radius: 8px; border: 1px solid #2a2a2a; padding: 15px; display: flex; flex-direction: column; gap: 15px; overflow: hidden; }
        .drawn-card { background-color: #252525; border-radius: 6px; padding: 12px; text-align: center; border-left: 5px solid #d4af37; flex-shrink: 0; }
        .drawn-card .jersey { width: 45px; height: 45px; margin: 0 auto 8px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid #fff; }
        .drawn-card h2 { font-size: 18px; margin-bottom: 4px; }
        .drawn-card p { font-size: 12px; color: #aaa; margin-bottom: 4px; }
        .drawn-card .style-tag { font-size: 11px; color: #d4af37; font-style: italic; font-weight: bold; }
        
        .player-list-wrap { flex-grow: 1; overflow-y: auto; padding-right: 5px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #151515; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #b8962e; }

        .player-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; background-color: #151515; border-radius: 4px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .player-row:hover { border-color: #d4af37; background-color: #222; }
        .player-row.disabled { opacity: 0.25; cursor: not-allowed; pointer-events: none; }
        .player-info { display: flex; align-items: center; gap: 10px; }
        .player-num { font-size: 12px; font-weight: bold; color: #888; background: #252525; padding: 2px 6px; border-radius: 3px; min-width: 24px; text-align: center; }
        .player-text { display: flex; flex-direction: column; }
        .player-name { font-weight: bold; font-size: 13px; color: #fff; text-transform: uppercase; }
        .player-pos { font-size: 11px; color: #aaa; margin-top: 1px; }
        .player-ovr { font-size: 15px; font-weight: bold; color: #d4af37; }
        
        .center-panel { background-color: #151515; border-radius: 8px; padding: 10px; display: flex; justify-content: center; align-items: center; position: relative; border: 1px solid #2a2a2a; }
        .field { width: 100%; height: 100%; background-color: #1b5e20; border-radius: 6px; border: 3px solid #ffffff33; position: relative; overflow: hidden; }
        .field-line { position: absolute; border: 2px solid #ffffff1a; }
        .field-midline { top: 50%; left: 0; width: 100%; height: 0; transform: translateY(-50%); }
        .field-center-circle { top: 50%; left: 50%; width: 120px; height: 120px; border-radius: 50%; transform: translate(-50%, -50%); }
        .field-penalty-top { top: 0; left: 50%; width: 200px; height: 70px; border-top: none; transform: translateX(-50%); }
        .field-penalty-bottom { bottom: 0; left: 50%; width: 200px; height: 70px; border-bottom: none; transform: translateX(-50%); }
        
        .slot { position: absolute; width: 55px; height: 55px; border-radius: 50%; border: 2px dashed #ffffffaa; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; background-color: #00000044; }
        .slot:hover, .slot.active { border-color: #d4af37; background-color: #00000077; box-shadow: 0 0 10px #d4af3744; }
        .slot-pos { font-size: 12px; font-weight: bold; color: #fff; }
        .slot-name { font-size: 9px; color: #ffeb3b; text-align: center; max-width: 50px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: bold; text-transform: uppercase; }
        .slot.filled { border-style: solid; border-color: #d4af37; background-color: #1e1e1e; }
        .slot.filled .slot-pos { color: #d4af37; font-size: 10px; }
        
        .right-panel { background-color: #1e1e1e; border-radius: 8px; border: 1px solid #2a2a2a; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .box-score-header { display: flex; justify-content: space-between; font-size: 14px; border-bottom: 1px solid #2a2a2a; padding-bottom: 8px; color: #888; font-weight: bold; }
        .bars-container { display: flex; flex-direction: column; gap: 10px; background: #151515; padding: 10px; border-radius: 6px; }
        .bar-row { display: flex; align-items: center; justify-content: space-between; font-size: 12px; }
        .bar-label { width: 60px; font-weight: bold; }
        .bar-bg { flex-grow: 1; height: 8px; background-color: #2a2a2a; margin: 0 10px; border-radius: 4px; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; background-color: #d4af37; transition: width 0.3s; }
        .bar-val { font-weight: bold; width: 24px; text-align: right; color: #d4af37; }
        
        .lineup-checklist { flex-grow: 1; overflow-y: auto; font-size: 13px; padding-right: 5px;}
        .checklist-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #2a2a2a; }
        .checklist-item .name { color: #aaa; text-transform: uppercase;}
        .checklist-item.filled .name { color: #fff; font-weight: bold; }
        
        #btn-simulate { width: 100%; padding: 14px; font-size: 16px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; display: none; margin-top: auto; background: #d4af37; color: #121212; }
        
        .popup-pos-select { display: none; position: absolute; background: #252525; border: 1px solid #d4af37; padding: 10px; border-radius: 6px; z-index: 50; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .popup-pos-select p { font-size: 12px; margin-bottom: 8px; color: #aaa; text-transform: uppercase; font-weight: bold;}
        .popup-pos-buttons { display: flex; gap: 8px; flex-wrap: wrap;}
        .popup-pos-buttons button { padding: 4px 8px; font-size: 12px; }

        /* THE RUN - SIMULATION UI */
        #simulation-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #121212; z-index: 100; overflow-y: auto; padding: 40px; }
        .sim-container { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        
        .sim-header { border-bottom: 3px solid #d4af37; padding-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end; }
        .sim-header h1 { font-size: 32px; color: #fff; text-transform: uppercase; letter-spacing: 2px; }
        .sim-header p { color: #888; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .sim-controls button { background: #1e1e1e; color: #d4af37; border: 1px solid #d4af37; }
        .sim-controls button:hover { background: #d4af37; color: #121212; }

        .btn-reveal-match { background: #cc0000; color: #fff; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; text-transform: uppercase; cursor: pointer; border-radius: 4px; display: inline-block; max-width: 300px; text-align: center; }
        .btn-reveal-match:hover { background: #a30000; }

        /* Estilo da Tabela e das Partidas (Inspirado no 7a0) */
        .match-card { background: transparent; border-bottom: 1px solid #2a2a2a; margin-bottom: 5px; padding-bottom: 10px; }
        .match-main-row { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; font-size: 18px; text-transform: uppercase; font-weight: bold; }
        
        .match-info-left { display: flex; align-items: center; gap: 20px; width: 60%; }
        .match-stage { font-size: 12px; color: #888; width: 80px; letter-spacing: 1px; }
        .match-opponent { font-size: 22px; color: #fff; display: flex; align-items: center; gap: 10px; }
        .match-opponent span { font-size: 12px; color: #888; } /* o 'vs AT' */

        .match-info-right { display: flex; align-items: center; gap: 15px; width: 40%; justify-content: flex-end; }
        .match-score { font-size: 24px; color: #fff; letter-spacing: 2px; font-family: monospace; }
        .match-timer { font-size: 14px; color: #d4af37; background: #252525; padding: 4px 8px; border-radius: 4px; min-width: 45px; text-align: center; border: 1px solid #d4af37; }
        .match-timer.ended { background: transparent; border: none; color: #4caf50; font-size: 18px; } /* Checkmark verde */
        .match-timer.ended-loss { background: transparent; border: none; color: #cc0000; font-size: 18px; } /* X vermelho */

        .match-timeline { padding-left: 100px; display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px; }
        .timeline-event { display: flex; gap: 15px; align-items: center; padding: 4px 10px; font-size: 14px; text-transform: uppercase; font-weight: bold; animation: slideIn 0.3s ease-out forwards; }
        
        .event-user { border-left: 3px solid #4caf50; color: #fff; } /* Verde para os seus gols */
        .event-opp { border-left: 3px solid #cc0000; color: #fff; }  /* Vermelho para os gols sofridos */
        .event-time { color: #888; font-size: 12px; width: 30px; text-align: right; }

        .match-summary { padding-left: 100px; font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 15px; display: none; }
        
        /* Grid para o painel lateral de classificação */
        .simulation-grid { display: grid; grid-template-columns: 1fr 300px; gap: 40px; margin-top: 20px; }
        
        .standings-panel { background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 8px; padding: 20px; height: fit-content; }
        .standings-panel h3 { font-size: 14px; text-transform: uppercase; color: #d4af37; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px;}
        .standings-table { width: 100%; border-collapse: collapse; font-size: 13px; text-transform: uppercase; }
        .standings-table th, .standings-table td { padding: 8px 4px; text-align: center; }
        .standings-table th { color: #888; border-bottom: 1px solid #333; }
        .standings-table td.t-name { text-align: left; font-weight: bold; color: #fff; }
        .standings-table tr.user-row { background: #252525; border-left: 3px solid #d4af37; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div id="draft-view">
        <header>
            <div class="logo">
                <h1>6 A 7</h1>
                <p>Draft & Simulação de Elencos Reais Históricos</p>
            </div>
            <div class="controls">
                <select id="select-mode">
                    <option value="normal">Modo Normal (OVR Visível • 3 Pulos)</option>
                    <option value="craque">Modo Craque (OVR Oculto • 1 Pulo)</option>
                </select>
                <select id="select-scheme">
                    <option value="433">4-3-3 Equilibrado</option>
                    <option value="442">4-4-2 Clássico</option>
                    <option value="422_def">4-4-2 Defensivo (2 CDM)</option>
                    <option value="433_of">4-3-3 Ofensivo (1 CAM)</option>
                    <option value="433_def">4-3-3 Defensivo (2 CDM)</option>
                    <option value="4231">4-2-3-1 Moderno</option>
                    <option value="424">4-2-4 Ataque Total</option>
                    <option value="343">3-4-3 Ala Ofensiva</option>
                    <option value="532">5-3-2 Linha de 3 Zagueiros</option>
                    <option value="541">5-4-1 Retranca Copeira</option>
                </select>
                <button id="btn-draw-team">SORTEAR TIME</button>
                <button id="btn-skip-team" style="display:none;">PULAR TIME (<span id="txt-skips">3</span>)</button>
            </div>
        </header>

        <div class="main-container">
            <div class="left-panel">
                <div id="drawn-card-area" style="display:none;">
                    <div class="drawn-card" id="drawn-card-element">
                        <div class="jersey" id="drawn-jersey">👕</div>
                        <h2 id="drawn-team-name" style="text-transform:uppercase;">--</h2>
                        <p id="drawn-team-year">--</p>
                        <div class="style-tag" id="drawn-team-style">--</div>
                    </div>
                </div>
                <div class="player-list-wrap" id="player-selection-list">
                    <p style="color:#666; text-align:center; margin-top:40px; font-size:14px; text-transform:uppercase;">Sorteie um clube para revelar os jogadores.</p>
                </div>
            </div>

            <div class="center-panel">
                <div class="field" id="football-field">
                    <div class="field-line field-midline"></div>
                    <div class="field-line field-center-circle"></div>
                    <div class="field-line field-penalty-top"></div>
                    <div class="field-line field-penalty-bottom"></div>
                </div>
                
                <div class="popup-pos-select" id="pos-select-popup">
                    <p>Escalar como:</p>
                    <div class="popup-pos-buttons" id="popup-pos-buttons-container"></div>
                </div>
            </div>

            <div class="right-panel">
                <div class="box-score-header">
                    <span>EQUILÍBRIO TÁTICO</span>
                    <span id="txt-box-score-count">0 / 11</span>
                </div>
                
                <div class="bars-container" id="tactics-bars-area" style="display:none;">
                    <div class="bar-row"><span class="bar-label">ATAQUE</span><div class="bar-bg"><div class="bar-fill" id="bar-atq"></div></div><span class="bar-val" id="val-atq">0</span></div>
                    <div class="bar-row"><span class="bar-label">CRIAÇÃO</span><div class="bar-bg"><div class="bar-fill" id="bar-cri"></div></div><span class="bar-val" id="val-cri">0</span></div>
                    <div class="bar-row"><span class="bar-label">PROTEÇÃO</span><div class="bar-bg"><div class="bar-fill" id="bar-pro"></div></div><span class="bar-val" id="val-pro">0</span></div>
                    <div class="bar-row"><span class="bar-label">DEFESA</span><div class="bar-bg"><div class="bar-fill" id="bar-def"></div></div><span class="bar-val" id="val-def">0</span></div>
                </div>

                <div class="lineup-checklist" id="lineup-checklist-element"></div>

                <button id="btn-simulate">INICIAR THE RUN →</button>
            </div>
        </div>
    </div>

    <div id="simulation-view">
        <div class="sim-container">
            <div class="sim-header">
                <div>
                    <p>6 A 7 - MODO CARREIRA</p>
                    <h1>The Run</h1>
                </div>
                <div class="sim-controls">
                    <button id="btn-restart" onclick="location.reload()">NOVO DRAFT</button>
                </div>
            </div>

            <div class="simulation-grid">
                <div id="matches-list">
                    <button class="btn-reveal-match" id="btn-reveal-first">REVELAR 1º JOGO →</button>
                    </div>

                <div class="standings-panel" id="standings-panel" style="display:none;">
                    <h3>Grupo da Morte</h3>
                    <table class="standings-table">
                        <thead>
                            <tr><th>Time</th><th>P</th><th>V</th><th>SG</th></tr>
                        </thead>
                        <tbody id="standings-tbody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

        let activeScheme = "433";
        let activeMode = "normal";
        let currentDrawnTeam = null;
        let skipsLeft = 3;
        let userLineup = []; 
        let activeSlotIndex = null;

        const fieldEl = document.getElementById("football-field");
        const checklistEl = document.getElementById("lineup-checklist-element");
        const selectSchemeEl = document.getElementById("select-scheme");
        const selectModeEl = document.getElementById("select-mode");
        const btnDrawTeam = document.getElementById("btn-draw-team");

        const btnSimulate = document.getElementById("btn-simulate");

        function init() {
            renderField();
            renderChecklist();
            updateTacticBars();
            
            selectSchemeEl.addEventListener("change", (e) => {
                if(userLineup.length > 0) {
                    if(!confirm("Mudar o esquema tático irá resetar seu progresso atual. Deseja continuar?")) {
                        selectSchemeEl.value = activeScheme;
                        return;
                    }
                }
                activeScheme = e.target.value;
                resetDraft();
            });

            selectModeEl.addEventListener("change", (e) => {
                activeMode = e.target.value;
                skipsLeft = activeMode === "normal" ? 3 : 1;
                txtSkips.innerText = skipsLeft;
                resetDraft();
            });

            btnDrawTeam.addEventListener("click", drawTeam);
            btnSkipTeam.addEventListener("click", skipTeam);
            btnSimulate.addEventListener("click", startTournamentCampaign);
            
            // Adicionado listener the run
            document.getElementById("btn-reveal-first").addEventListener("click", runNextMatch);
        }

        function resetDraft() {
            userLineup = [];
            currentDrawnTeam = null;
            activeSlotIndex = null;
            document.getElementById("drawn-card-area").style.display = "none";
            document.getElementById("player-selection-list").innerHTML = '<p style="color:#666; text-align:center; margin-top:40px; font-size:14px; text-transform:uppercase;">Sorteie um clube para revelar os jogadores.</p>';
            renderField();
            renderChecklist();
            updateTacticBars();
            btnSimulate.style.display = "none";
            btnSkipTeam.style.display = "none";
            btnDrawTeam.style.display = "inline-block";
        }

        function renderField() {
            const slots = fieldEl.querySelectorAll(".slot");
            slots.forEach(s => s.remove());

            schemes[activeScheme].forEach((p, idx) => {
                const slotEl = document.createElement("div");
                slotEl.classList.add("slot");
                slotEl.style.left = `${p.x}%`;
                slotEl.style.bottom = `${p.y}%`;
                slotEl.dataset.index = idx;

                const filled = userLineup.find(l => l.slotIndex === idx);
                if(filled) {
                    slotEl.classList.add("filled");
                    slotEl.innerHTML = `<span class="slot-pos">${filled.assignedPos}</span><span class="slot-name">${filled.player.nome}</span>`;
                } else {
                    slotEl.innerHTML = `<span class="slot-pos">${p.pos}</span>`;
                }

                if(activeSlotIndex === idx) slotEl.classList.add("active");

                slotEl.addEventListener("click", () => {
                    if(userLineup.find(l => l.slotIndex === idx)) return; 
                    activeSlotIndex = idx;
                    renderField();
                    if(currentDrawnTeam) renderPlayerList();
                });
                fieldEl.appendChild(slotEl);
            });
        }

        function renderChecklist() {
            checklistEl.innerHTML = "";
            schemes[activeScheme].forEach((p, idx) => {
                const item = document.createElement("div");
                item.classList.add("checklist-item");
                
                const filled = userLineup.find(l => l.slotIndex === idx);
                if(filled) {
                    item.classList.add("filled");
                    const ovrDisplay = activeMode === "normal" ? filled.player.ovr : "??";
                    item.innerHTML = `<span class="pos">[${p.pos}]</span> <span class="name">#${filled.player.num} ${filled.player.nome}</span> <span style="color:#d4af37; font-weight:bold;">${ovrDisplay}</span>`;
                } else {
                    item.innerHTML = `<span class="pos">[${p.pos}]</span> <span class="name">-- Vazio --</span> <span>--</span>`;
                }
                checklistEl.appendChild(item);
            });
            document.getElementById("txt-box-score-count").innerText = `${userLineup.length} / 11`;
            if(userLineup.length === 11) btnSimulate.style.display = "block";
        }

        function drawTeam() {
            if(userLineup.length === 11) return;
            
            if(currentDrawnTeam !== null) {
                skipTeam();
                return;
            }

            const randIdx = Math.floor(Math.random() * db.length);
            currentDrawnTeam = db[randIdx];

            document.getElementById("drawn-card-area").style.display = "block";
            const jersey = document.getElementById("drawn-jersey");
            jersey.style.backgroundColor = currentDrawnTeam.cor;
            jersey.style.color = currentDrawnTeam.texto_cor;
            
            document.getElementById("drawn-team-name").innerText = currentDrawnTeam.time;
            document.getElementById("drawn-team-year").innerText = currentDrawnTeam.ano;
            document.getElementById("drawn-team-style").innerText = currentDrawnTeam.estilo;

            btnDrawTeam.style.display = "none";
            btnSkipTeam.style.display = "inline-block";

            renderPlayerList();
        }

        function skipTeam() {
            if(skipsLeft <= 0) { 
                alert("Você gastou todos os pulos! Deve escolher obrigatoriamente um jogador deste elenco."); 
                return; 
            }
            skipsLeft--;
            txtSkips.innerText = skipsLeft;
            currentDrawnTeam = null; 
            drawTeam();
        }

        function renderPlayerList() {
            const listContainer = document.getElementById("player-selection-list");
            listContainer.innerHTML = "";

            if(!currentDrawnTeam) return;

            const title = document.createElement("h3");
            title.innerText = "Escolha um jogador do elenco:";
            title.style.fontSize = "13px";
            title.style.marginBottom = "10px";
            title.style.color = "#d4af37";
            listContainer.appendChild(title);

            currentDrawnTeam.jogadores.forEach(player => {
                const row = document.createElement("div");
                row.classList.add("player-row");

                const openPositions = schemes[activeScheme].filter((p, i) => !userLineup.some(l => l.slotIndex === i));
                const playerPositions = player.pos.split("/");
                const matchingPositions = playerPositions.filter(pos => openPositions.some(op => op.pos === pos));
                
                if(matchingPositions.length === 0) row.classList.add("disabled");

                const ovrText = activeMode === "normal" ? player.ovr : "??";

                row.innerHTML = `
                    <div class="player-info">
                        <span class="player-num">#${player.num}</span>
                        <div class="player-text">
                            <span class="player-name">${player.nome}</span>
                            <span class="player-pos">${player.pos}</span>
                        </div>
                    </div>
                    <span class="player-ovr">${ovrText}</span>
                `;

                row.addEventListener("click", () => {
                    if(matchingPositions.length === 0) return;
                    
                    if(matchingPositions.length === 1) {
                        const targetSlot = schemes[activeScheme].findIndex((p, i) => p.pos === matchingPositions[0] && !userLineup.some(l => l.slotIndex === i));
                        assignPlayerToSlot(player, targetSlot, matchingPositions[0]);
                    } else {
                        showPosSelectPopup(player, matchingPositions, row);
                    }
                });
                listContainer.appendChild(row);
            });
        }

        function showPosSelectPopup(player, matchPositions, anchorEl) {
            const popup = document.getElementById("pos-select-popup");
            const container = document.getElementById("popup-pos-buttons-container");
            container.innerHTML = "";

            matchPositions.forEach(pos => {
                const btn = document.createElement("button");
                btn.innerText = pos;
                btn.addEventListener("click", () => {
                    const targetSlot = schemes[activeScheme].findIndex((p, i) => p.pos === pos && !userLineup.some(l => l.slotIndex === i));
                    assignPlayerToSlot(player, targetSlot, pos);
                    popup.style.display = "none";
                });
                container.appendChild(btn);
            });

            const rect = anchorEl.getBoundingClientRect();
            popup.style.top = `${window.scrollY + rect.top - 60}px`;
            popup.style.left = `${window.scrollX + rect.left + 20}px`;
            popup.style.display = "block";
        }

        function assignPlayerToSlot(player, slotIndex, positionName) {
            userLineup.push({ slotIndex, player, assignedPos: positionName });
            currentDrawnTeam = null; 
            activeSlotIndex = null;
            document.getElementById("drawn-card-area").style.display = "none";
            document.getElementById("player-selection-list").innerHTML = '<p style="color:#666; text-align:center; margin-top:40px; font-size:14px; text-transform:uppercase;">Escalado! Sorteie o próximo clube.</p>';
            
            btnDrawTeam.style.display = "inline-block";
            btnSkipTeam.style.display = "none";

            renderField();
            renderChecklist();
            updateTacticBars();
        }

        function updateTacticBars() {
            const barsArea = document.getElementById("tactics-bars-area");
            
            if(userLineup.length < 11) {
                barsArea.style.display = "none";
                return;
            }
            
            barsArea.style.display = "flex";

            let sumAtq = 0, countAtq = 0, sumCri = 0, countCri = 0, sumPro = 0, countPro = 0, sumDef = 0, countDef = 0;

            userLineup.forEach(l => {
                const p = l.player;
                const pos = l.assignedPos;
                if(["ST", "LW", "RW"].includes(pos)) { sumAtq += p.atq; countAtq++; }
                if(["CAM", "CM", "RM", "LM"].includes(pos)) { sumCri += p.cri; countCri++; }
                if(["CDM", "CM"].includes(pos)) { sumPro += p.def; countPro++; }
                if(["CB", "LB", "RB"].includes(pos)) { sumDef += p.def; countDef++; }
            });

            let atqSector = countAtq > 0 ? Math.round(sumAtq / countAtq) : 40;
            let criSector = countCri > 0 ? Math.round(sumCri / countCri) : 40;
            let proSector = countPro > 0 ? Math.round(sumPro / countPro) : 30; 
            let defSector = countDef > 0 ? Math.round(sumDef / countDef) : 40;

            defSector = Math.round(defSector + (proSector * 0.15));
            if(proSector < 55) defSector = Math.round(defSector * 0.8); 

            setBar("atq", Math.min(atqSector, 99));
            setBar("cri", Math.min(criSector, 99));
            setBar("pro", Math.min(proSector, 99));
            setBar("def", Math.min(defSector, 99));
        }

        function setBar(id, val) {
            document.getElementById(`bar-${id}`).style.width = `${val}%`;
            document.getElementById(`val-${id}`).innerText = val;
        }

        // =====================================
        // MOTOR CAMPEONATO THE RUN
        // =====================================
        let tournamentStage = 0; 
        let opponentsPool = [];
        let groupTeams = [];
        let matchTickerInterval = null;

        function startTournamentCampaign() {
            if(activeMode === "craque") { activeMode = "normal"; renderChecklist(); }

            opponentsPool = [];
            const copyDb = [...db];
            for(let i=0; i<7; i++) {
                const r = Math.floor(Math.random() * copyDb.length);
                opponentsPool.push(copyDb.splice(r, 1)[0]);
            }

            groupTeams = [
                { name: "Sua Seleção", points: 0, v: 0, e: 0, d: 0, gf: 0, gs: 0, isUser: true },
                { name: `${opponentsPool[0].time} ${opponentsPool[0].ano}`, points: 0, v: 0, e: 0, d: 0, gf: 0, gs: 0, dbRef: opponentsPool[0] },
                { name: `${opponentsPool[1].time} ${opponentsPool[1].ano}`, points: 0, v: 0, e: 0, d: 0, gf: 0, gs: 0, dbRef: opponentsPool[1] },
                { name: `${opponentsPool[2].time} ${opponentsPool[2].ano}`, points: 0, v: 0, e: 0, d: 0, gf: 0, gs: 0, dbRef: opponentsPool[2] }
            ];

            tournamentStage = 0;
            
            // Esconde UI de Draft e mostra "The Run"
            document.getElementById("draft-view").style.display = "none";
            document.getElementById("simulation-view").style.display = "block";
            document.getElementById("standings-panel").style.display = "block";
            document.getElementById("btn-reveal-first").style.display = "block";
            
            renderStandings();
        }

        function renderStandings() {
            groupTeams.sort((a,b) => b.points - a.points || (b.gf - b.gs) - (a.gf - a.gs) || b.gf - a.gf);
            const tbody = document.getElementById("standings-tbody");
            tbody.innerHTML = "";
            groupTeams.forEach(t => {
                const tr = document.createElement("tr");
                if(t.isUser) tr.classList.add("user-row");
                tr.innerHTML = `<td class="t-name">${t.name}</td><td>${t.points}</td><td>${t.v}</td><td>${t.gf - t.gs}</td>`;
                tbody.appendChild(tr);
            });
        }

        function getTeamStats(teamObj) {
            if(teamObj.isUser) {
                return {
                    atq: parseInt(document.getElementById("val-atq").innerText),
                    cri: parseInt(document.getElementById("val-cri").innerText),
                    pro: parseInt(document.getElementById("val-pro").innerText),
                    def: parseInt(document.getElementById("val-def").innerText),
                    gk: userLineup.find(l => l.assignedPos === "GK").player.ovr,
                    nome: "Sua Seleção", jogadores: userLineup.map(l => l.player)
                };
            } else {
                let sum = 0; teamObj.dbRef.jogadores.forEach(j => sum += j.ovr);
                let avg = Math.round(sum / 17);
                let gkObj = teamObj.dbRef.jogadores.find(j => j.pos === "GK") || {ovr: 85};
                return {
                    atq: avg, cri: avg, pro: avg, def: avg, gk: gkObj.ovr,
                    nome: teamObj.name, jogadores: teamObj.dbRef.jogadores
                };
            }
        }

        // Inicia a próxima partida na UI "The Run"
        function runNextMatch() {
            // Remove o botão anterior
            const btnReveal = document.getElementById("btn-reveal-first") || document.querySelector(".btn-reveal-match");
            if(btnReveal) btnReveal.remove();

            // Determina Fase e Oponente
            let isKnockout = tournamentStage >= 3;
            let opponent = isKnockout ? 
                { name: `${opponentsPool[tournamentStage].time} ${opponentsPool[tournamentStage].ano}`, isUser: false, dbRef: opponentsPool[tournamentStage] } : 
                groupTeams[tournamentStage + 1];

            let stageName = isKnockout ? ["OITAVAS", "QUARTAS", "SEMIFINAL", "FINAL"][tournamentStage - 3] : "FASE DE GRUPOS";
            if (isKnockout) document.getElementById("standings-panel").style.display = "none";

            // Cria o Card da Partida
            const matchesList = document.getElementById("matches-list");
            const matchId = `match-${tournamentStage}`;
            
            const matchHTML = `
                <div class="match-card" id="${matchId}">
                    <div class="match-main-row">
                        <div class="match-info-left">
                            <span class="match-stage">${stageName}</span>
                            <span class="match-opponent"><span>vs AT</span> ${opponent.name}</span>
                        </div>
                        <div class="match-info-right">
                            <span class="match-score" id="score-${matchId}">0 - 0</span>
                            <span class="match-timer" id="timer-${matchId}">1'</span>
                        </div>
                    </div>
                    <div class="match-timeline" id="timeline-${matchId}"></div>
                    <div class="match-summary" id="summary-${matchId}"></div>
                </div>
            `;
            matchesList.insertAdjacentHTML('beforeend', matchHTML);
            window.scrollTo(0, document.body.scrollHeight);

            // Simula o jogo
            simulateMatchTheRunStyle(matchId, groupTeams[0], opponent, isKnockout, (userScore, oppScore, uGoals, oGoals) => {
                // Ao terminar o jogo
                const timerEl = document.getElementById(`timer-${matchId}`);
                
                // Trata pontos de grupo
                if(!isKnockout) {
                    updateTeamRow(groupTeams[0], userScore, oppScore);
                    updateTeamRow(opponent, oppScore, userScore);
                    // Jogos invisíveis dos bots
                    let botA = groupTeams[tournamentStage === 0 ? 2 : tournamentStage === 1 ? 3 : 1];
                    let botB = groupTeams[tournamentStage === 0 ? 3 : tournamentStage === 1 ? 1 : 2];
                    updateTeamRow(botA, Math.floor(Math.random()*3), Math.floor(Math.random()*3));
                    renderStandings();
                }

                // Lógica de Sucesso/Falha
                let userProceeds = false;
                if(!isKnockout) {
                    if (tournamentStage === 2) {
                        renderStandings();
                        userProceeds = groupTeams.findIndex(t => t.isUser) <= 1;
                    } else {
                        userProceeds = true; // Só avança jogo de grupo normal
                    }
                } else {
                    userProceeds = userScore > oppScore;
                }

                // Update visual checkmark
                if ((!isKnockout && userProceeds) || (isKnockout && userProceeds)) {
                    timerEl.innerText = "✓";
                    timerEl.className = "match-timer ended";
                } else {
                    timerEl.innerText = "✗";
                    timerEl.className = "match-timer ended-loss";
                }

                // Cria o summary com os autores
                const summaryEl = document.getElementById(`summary-${matchId}`);
                summaryEl.innerText = `GOLS: ${uGoals.join(", ") || "Nenhum"} | SOFRIDOS: ${oGoals.join(", ") || "Nenhum"}`;

                tournamentStage++;

                // Lógica de Fim de Torneio ou Próximo Jogo
                if (tournamentStage === 7 && userProceeds) {
                    const btn = document.createElement("button");
                    btn.className = "btn-reveal-match";
                    btn.style.background = "#d4af37";
                    btn.style.color = "#121212";
                    btn.innerText = "🏆 CAMPEÃO INVICTO!";
                    matchesList.appendChild(btn);
                    setTimeout(() => { alert("Você entrou para a história do 6 A 7!"); }, 500);
                } else if (!userProceeds && (tournamentStage === 3 || isKnockout)) {
                    const btn = document.createElement("button");
                    btn.className = "btn-reveal-match";
                    btn.style.background = "#1e1e1e";
                    btn.style.border = "1px solid #cc0000";
                    btn.innerText = "ELIMINADO";
                    matchesList.appendChild(btn);
                } else {
                    const btn = document.createElement("button");
                    btn.className = "btn-reveal-match";
                    btn.innerText = "PRÓXIMO JOGO →";
                    btn.onclick = () => {
                        // Collapse
                        document.getElementById(`timeline-${matchId}`).style.display = "none";
                        summaryEl.style.display = "block";
                        runNextMatch();
                    };
                    matchesList.appendChild(btn);
                }
                window.scrollTo(0, document.body.scrollHeight);
            });
        }

        function simulateMatchTheRunStyle(matchId, homeTeam, awayTeam, isKnockout, onComplete) {
            const h = getTeamStats(homeTeam); const a = getTeamStats(awayTeam);
            const scoreEl = document.getElementById(`score-${matchId}`);
            const timerEl = document.getElementById(`timer-${matchId}`);
            const timelineEl = document.getElementById(`timeline-${matchId}`);

            let minute = 1, hScore = 0, aScore = 0;
            let uGoals = []; let oGoals = [];

            matchTickerInterval = setInterval(() => {
                if(minute > 90) {
                    clearInterval(matchTickerInterval);
                    if(isKnockout && hScore === aScore) { 
                        if(Math.random() > 0.5) hScore++; else aScore++; 
                        scoreEl.innerText = `${hScore} - ${aScore}`;
                    }
                    onComplete(hScore, aScore, uGoals, oGoals);
                    return;
                }

                // Chance de Perigo (11%)
                if(Math.random() < 0.11) {
                    let pHome = (h.cri + h.pro) / (h.cri + h.pro + a.cri + a.pro);
                    if(Math.random() < pHome) {
                        if(Math.random() * 100 <= (45 + (h.atq - a.def)/2)) {
                            if(Math.random() * 100 <= (35 + h.atq - a.gk)) {
                                hScore++;
                                let autor = h.jogadores[Math.floor(Math.random()*h.jogadores.length)].nome;
                                uGoals.push(autor);
                                appendTimelineEvent(timelineEl, minute, autor, true);
                            }
                        }
                    } else {
                        if(Math.random() * 100 <= (45 + (a.atq - h.def)/2)) {
                            if(Math.random() * 100 <= (35 + a.atq - h.gk)) {
                                aScore++;
                                let autor = a.jogadores[Math.floor(Math.random()*a.jogadores.length)].nome;
                                oGoals.push(autor);
                                appendTimelineEvent(timelineEl, minute, autor, false);
                            }
                        }
                    }
                }
                
                scoreEl.innerText = `${hScore} - ${aScore}`;
                timerEl.innerText = `${minute}'`;
                minute++;
            }, 50); // 50ms = 4.5 segundos a partida inteira
        }

        function appendTimelineEvent(container, minute, player, isUser) {
            const div = document.createElement("div");
            div.className = `timeline-event ${isUser ? 'event-user' : 'event-opp'}`;
            div.innerHTML = `<span class="event-time">${minute}'</span> <span class="event-player">${player}</span>`;
            container.appendChild(div);
        }

        function updateTeamRow(t, gf, gs) {
            t.gf += gf; t.gs += gs;
            if(gf > gs) t.points += 3; else if(gf === gs) t.points += 1;
        }

        window.onload = init;
    </script>
</body>
</html>
